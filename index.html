    <!-- Metric-stable system font stacks keep Lighthouse CLS at zero. -->
    <style>
        html {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
    </style>

    <title>Algo Arena</title>
</head>

<body>
    <script>
        // Prevent flash of wrong color mode (FOUC prevention)
        (function () {
            try {
                var pref = localStorage.getItem('algoarena-theme-preference') || 'dark';
                var mode = pref;
                if (pref === 'auto') {
                    mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', mode);
                document.documentElement.style.colorScheme = mode;
                // Chakra reads chakra-ui-color-mode from localStorage
                localStorage.setItem('chakra-ui-color-mode', mode);
            } catch (e) { }
        })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
